pipeline:
  name: AI_PreAuthorization_Preparation_System
  version: "2.0"
  description: >
    AI pipeline that analyzes patient medical documents and insurance information,
    validates all 7 pre-authorization steps using a deterministic checklist,
    checks clinical eligibility criteria, and generates a completed
    pre-authorization request form (including JPG form fill).

  reliability_design:
    document_checking: deterministic   # never hallucinated — same input = same output
    clinical_criteria: programmatic_first_then_llm
    llm_temperature:   0.0             # all agents run at temp=0 for consistency

  input:
    description: >
      User uploads all available patient documents. No structured inputs required.
    schema:
      documents:
        type: list
        items:
          document_name: string
          file_type: pdf | image | doc

  # ════════════════════════════════════════════════════════════════════════════
  stages:
  # ════════════════════════════════════════════════════════════════════════════

  - agent: document_intelligence_agent        # Agent 1
    model: amazon.nova-pro
    strategy: two_pass_extraction
    pass_1:
      purpose: Core field extraction (patient, insurance, clinical, lab, cost)
      max_tokens: 4096
    pass_2:
      purpose: Per-document detail summary
      max_tokens: 1500
      blocking: false   # pipeline continues even if this pass fails
    output_schema:
      documents:
        type: list
        items:
          document_type: string
          content: object              # FULL values, not just field names
          completeness:
            completeness_score: float  # 0.0 – 1.0
            missing_critical_fields: list
            null_fields: list
      document_content_map: object     # { doc_type → content }
      field_source_map: object         # { field → which doc it came from }
      null_fields_by_doc: object       # { doc_type → [empty fields] }
      completeness_summary: object     # { doc_type → { score, status, missing } }
      per_document_extraction: list    # per-image detail (Pass 2)
    error_handling:
      json_repair: true
      graceful_degradation: true

  - agent: policy_query_agent                 # Agent 2
    model: amazon.nova-micro
    purpose: Sanity-check extracted fields before policy lookup
    output_schema:
      ready: boolean
      missing_required: list
      missing_recommended: list

  - agent: policy_retrieval_agent             # Agent 3
    model: amazon.nova-lite
    temperature: 0.0
    strategy: deterministic_checklist_plus_llm
    deterministic_layer:
      purpose: >
        Evaluate the 7 pre-authorization steps against confirmed-present documents.
        This layer is 100% deterministic — same input always produces same output.
      checklist_steps:
        - step: 1_insurance_info
          label: Patient Insurance Information
          required: true
          satisfied_by: [Insurance Card, Patient Information Sheet]
          proof_fields:
            Insurance Card: [insurer_name, policy_number, member_id]
            Patient Information Sheet: [patient_name, dob]
        - step: 1_patient_demographics
          label: Patient Demographics
          required: true
          satisfied_by: [Patient Information Sheet, Doctor Notes]
        - step: 2_procedure_codes
          label: Procedure Codes (CPT/HCPCS)
          required: true
          satisfied_by: [Doctor Notes, Medical Pretreatment Estimate]
          proof_fields:
            Doctor Notes: [requested_procedure, cpt_codes]
        - step: 3_diagnosis_icd10
          label: Primary Diagnosis with ICD-10 Code
          required: true
          satisfied_by: [Doctor Notes, Physician Referral]
          proof_fields:
            Doctor Notes: [diagnosis, icd10_codes]
        - step: 3_clinical_findings
          label: Clinical Examination Findings
          required: true
          satisfied_by: [Doctor Notes]
          proof_fields:
            Doctor Notes: [clinical_findings]
        - step: 4_prior_treatments
          label: Prior Treatments / Step Therapy Documentation
          required: true
          satisfied_by: [Doctor Notes, Physician Referral, Prior Treatment Documentation]
          proof_fields:
            Doctor Notes: [prior_treatments]
        - step: 5_expedited_review
          label: Expedited Review Justification
          required: false   # only if urgency requested
        - step: 6_cost_estimate
          label: Pretreatment Cost Estimate
          required: true
          satisfied_by: [Medical Pretreatment Estimate]
          proof_fields:
            Medical Pretreatment Estimate: [total_estimated_cost]
        - step: 6_ordering_physician
          label: Ordering Physician Credentials
          required: true
          satisfied_by: [Doctor Notes, Physician Referral, Prescription]
          proof_fields:
            Doctor Notes: [ordering_physician, physician_specialty]
        - step: 6_lab_results
          label: Lab Results
          required: false
          satisfied_by: [Lab Report]
        - step: 6_prescription
          label: Prescription Record (for medication trials)
          required: false
          satisfied_by: [Prescription, Doctor Notes]
    llm_layer:
      purpose: >
        Assess clinical compliance criteria only.
        CANNOT generate new document requirements — that is handled by the
        deterministic layer. Only evaluates: symptom duration, step therapy,
        clinical exam adequacy, medication trial, specialist referral.
      temperature: 0.0
    output_schema:
      canonical_requirements: list      # from deterministic layer — authoritative
      checklist_result: object          # full checklist evaluation
      missing_documents: list           # only truly missing required docs
      optional_missing: list            # non-blocking optional docs
      policy_analysis: object           # LLM clinical criteria assessment

  - agent: document_requirement_checker       # Agent 4
    model: amazon.nova-micro
    purpose: >
      Re-verify each canonical requirement using FULL document content values.
      Catch partial documents (present but with null critical fields).
      Generate precise, actionable user instructions.
    strategy: programmatic_verify_then_user_prompts
    input:
      canonical_requirements: agent3.output.canonical_requirements
      checklist_result: agent3.output.checklist_result
      document_content_map: agent1.output.document_content_map
      completeness_summary: agent1.output.completeness_summary
      null_fields_by_doc: agent1.output.null_fields_by_doc
    halt_conditions:
      - truly_missing documents exist
      - partial_docs_blocking (completeness_score < 0.5 on a required doc)
    output_schema:
      can_proceed: boolean
      verified_present: list
      missing_docs: list
      partial_docs_blocking: list
      partial_docs_soft: list
      user_action_required: list    # sorted HIGH → LOW priority
      document_completeness: object

  - agent: clinical_requirements_agent        # Agent 5
    model: amazon.nova-pro
    purpose: >
      Check clinical pre-authorization requirements programmatically:
        - Minimum symptom duration (procedure-specific)
        - Step therapy / medication trial compliance
        - Specialist referral presence
        - Clinical examination documentation
      Then run LLM eligibility determination.
    strategy: programmatic_checks_first_then_llm
    programmatic_checks:
      - minimum_symptom_duration
      - step_therapy_compliance
      - medication_trial_documentation
      - specialist_referral_check
      - clinical_findings_check
    llm_override_protection: >
      If programmatic checks find critical failures (step therapy unmet,
      symptom duration unmet), determination is overridden to PENDING_REVIEW
      even if LLM says APPROVED.
    output_schema:
      eligible: boolean
      determination: APPROVED | DENIED | PENDING_DOCS | PENDING_REVIEW
      clinical_requirements_check: object
      requirements_met: list
      requirements_not_met: list
      step_therapy_status: object
      criteria_evaluation: object

  - agent: prior_auth_form_generator          # Agent 6
    model: amazon.nova-lite
    purpose: >
      Generate a complete prior authorization form in JSON + text format.
      Maps all extracted data to the standard form fields.
    output_schema:
      form_json: object
      form_text: string
      form_json_path: string
      form_txt_path: string

  - agent: jpg_form_filler                    # Agent 6b (new)
    model: amazon.nova-pro
    purpose: >
      Fill the actual pre_auth_form.jpg by:
        1. Parsing form fields from the JPG using Nova Pro vision
        2. Mapping Agent 6 JSON output to form field coordinates
        3. Using Pillow to overlay text values at correct positions
        4. Saving a filled JPG for submission
    output_schema:
      filled_form_path: string
      fields_filled: list
      fields_skipped: list

  - agent: portal_automation_agent            # Agent 7
    model: amazon.nova-lite

  - agent: claim_status_tracker              # Agent 8
    model: amazon.nova-micro

  - agent: appeal_agent                      # Agent 9 (conditional)
    model: amazon.nova-pro
    trigger: determination == DENIED

  output:
    description: Completed prior authorization package ready for submission.
    files:
      - prior_auth_form_{mrn}_{ts}.json
      - prior_auth_form_{mrn}_{ts}.txt
      - pre_auth_form_filled_{mrn}_{ts}.jpg
      - appeal_letter_{mrn}_{ts}.txt   # only if denied
